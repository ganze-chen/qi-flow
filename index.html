<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>行气 · Qi-Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink-deepest: #1a1410;
      --ink-dark: #2a2420;
      --ink-mid: #4a4038;
      --ink-light: #6a6058;
      --ink-faint: #8a8078;
      --ink-ghost: #b0a898;
      --xuan-paper: #f0ece4;
      --xuan-warm: #e8e4dc;
      --xuan-shadow: #d8d4cc;
      --accent-gold: #c4a35a;
      --accent-gold-dim: rgba(196, 163, 90, 0.35);
      --font-title: 'Noto Serif SC', 'STSongti-SC-Regular', serif;
      --font-body: 'Noto Sans SC', 'PingFang SC', sans-serif;
      --ease-ink: cubic-bezier(0.25, 0.1, 0.25, 1.0);
      --ease-brush: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--xuan-paper);
      color: var(--ink-dark);
      font-family: var(--font-body);
    }

    #app { position: relative; width: 100vw; height: 100vh; }

    .canvas-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #camera-feed {
      object-fit: cover; transform: scaleX(-1);
      opacity: 0; transition: opacity 0.8s var(--ease-ink);
    }
    #camera-feed.visible { opacity: 0.10; }
    #debug-canvas { pointer-events: none; z-index: 10; }
    #ink-canvas   { pointer-events: none; z-index: 3; }
    #guide-canvas { pointer-events: none; z-index: 5; }

    /* ══════════════════════════════════════════════════════════
       LANDING SCREEN — 首屏 · 时节入口
       ══════════════════════════════════════════════════════════ */
    #landing-screen {
      position: absolute; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--xuan-paper);
      transition: opacity 0.8s var(--ease-brush), visibility 0.8s;
    }
    #landing-screen.hidden {
      opacity: 0; visibility: hidden; pointer-events: none;
    }
    #splash-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .landing-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; width: 100%;
    }

    /* Title */
    .landing-title {
      font-family: var(--font-title); font-weight: 700;
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      color: var(--ink-deepest);
      letter-spacing: 0.35em;
      margin-bottom: 0.15em;
      animation: fadeUp 1.2s var(--ease-brush) both;
    }
    .landing-subtitle {
      font-family: var(--font-title); font-weight: 300;
      font-size: clamp(0.85rem, 2vw, 1.15rem);
      color: var(--ink-light);
      letter-spacing: 0.2em;
      margin-bottom: 3em;
      animation: fadeUp 1.2s var(--ease-brush) 0.3s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Theme Circles */
    .theme-circles {
      display: flex; align-items: center;
      gap: clamp(18px, 4vw, 36px);
      margin-bottom: 1.8em;
      animation: fadeUp 1s var(--ease-brush) 0.6s both;
    }
    .theme-circle {
      position: relative;
      width: clamp(60px, 10vw, 80px);
      height: clamp(60px, 10vw, 80px);
      border-radius: 50%; cursor: pointer;
      transition: transform 0.4s var(--ease-brush), box-shadow 0.4s;
      overflow: hidden;
      border: 2px solid rgba(0,0,0,0.06);
    }
    .theme-circle::after {
      content: ''; position: absolute; inset: -1px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      transition: border-color 0.4s var(--ease-ink);
      pointer-events: none;
    }
    .theme-circle:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .theme-circle.selected {
      transform: scale(1.12);
      border-color: transparent;
      box-shadow: 0 4px 24px rgba(196, 163, 90, 0.2);
    }
    .theme-circle.selected::after { border-color: var(--accent-gold); }
    .theme-circle-inner {
      position: absolute; inset: 0; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .theme-circle-ink {
      font-family: var(--font-title); font-weight: 700;
      font-size: clamp(1.4rem, 3vw, 1.8rem);
      opacity: 0.25; user-select: none;
    }
    .theme-circle-season {
      position: absolute; bottom: -22px; left: 50%;
      transform: translateX(-50%); white-space: nowrap;
      font-family: var(--font-title); font-size: 0.6rem;
      color: var(--ink-faint); letter-spacing: 0.06em;
      opacity: 0; transition: opacity 0.3s;
    }
    .theme-circle.selected .theme-circle-season,
    .theme-circle:hover .theme-circle-season { opacity: 1; }

    /* Theme Description */
    .theme-desc {
      text-align: center; min-height: 4.5em;
      margin-bottom: 2.5em;
      transition: opacity 0.4s var(--ease-ink);
      animation: fadeUp 1s var(--ease-brush) 0.8s both;
    }
    .theme-desc-name {
      font-family: var(--font-title);
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: var(--ink-dark); letter-spacing: 0.18em;
      margin-bottom: 0.25em;
    }
    .theme-desc-en {
      font-size: 0.75rem; color: var(--ink-faint);
      letter-spacing: 0.05em; margin-bottom: 0.6em;
    }
    .theme-desc-mood {
      font-family: var(--font-title); font-weight: 300;
      font-size: 0.78rem; color: var(--ink-light);
      letter-spacing: 0.08em;
    }

    /* Start Button — PRD: 墨色圆角矩形 + 晕开hover */
    .btn-ink {
      font-family: var(--font-title); font-size: 1rem;
      letter-spacing: 0.25em; padding: 0.95em 3em;
      border: none; border-radius: 6px;
      background: var(--ink-deepest); color: var(--xuan-paper);
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform 0.3s var(--ease-ink);
      animation: fadeUp 1s var(--ease-brush) 1s both;
    }
    .btn-ink::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 0; height: 0; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      transition: width 0.5s var(--ease-brush), height 0.5s var(--ease-brush);
    }
    .btn-ink:hover { transform: scale(1.02); }
    .btn-ink:hover::before { width: 300px; height: 300px; }
    .btn-ink:active { transform: scale(0.97); }

    .landing-privacy {
      margin-top: 1.8em; font-size: 0.68rem;
      color: var(--ink-ghost); letter-spacing: 0.04em;
      max-width: 320px; text-align: center; line-height: 1.6;
      animation: fadeUp 1s var(--ease-brush) 1.2s both;
    }

    /* ══════════════════════════════════════════════════════════
       LOADING OVERLAY
       ══════════════════════════════════════════════════════════ */
    #loading-overlay {
      position: absolute; inset: 0; z-index: 95;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--xuan-paper);
      opacity: 0; visibility: hidden;
      transition: opacity 0.6s var(--ease-ink), visibility 0.6s;
    }
    #loading-overlay.visible { opacity: 1; visibility: visible; }
    #loading-overlay.fade-out { opacity: 0; visibility: hidden; }

    .loading-ink-drop {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ink-mid); margin-bottom: 3em;
      position: relative;
      animation: inkDrop 2.4s var(--ease-ink) infinite;
    }
    .loading-ink-drop::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px; border-radius: 50%;
      background: transparent;
      animation: inkRipple 2.4s var(--ease-ink) infinite;
    }
    @keyframes inkDrop {
      0%   { transform: scale(0.5); opacity: 0; }
      15%  { transform: scale(1); opacity: 0.8; }
      40%  { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(0.8); opacity: 0; }
    }
    @keyframes inkRipple {
      0%   { width: 8px; height: 8px; border: 1px solid rgba(74,64,56,0.3); }
      40%  { width: 40px; height: 40px; border: 1px solid rgba(74,64,56,0.1); }
      100% { width: 70px; height: 70px; border: 1px solid transparent; }
    }
    .loading-status {
      font-family: var(--font-title); font-size: 0.85rem;
      color: var(--ink-light); letter-spacing: 0.12em;
      margin-bottom: 0.5em;
    }
    .loading-progress {
      width: 160px; height: 1.5px;
      background: var(--xuan-shadow);
      border-radius: 1px; overflow: hidden;
      margin-bottom: 4em;
    }
    .loading-progress-bar {
      height: 100%; width: 0%;
      background: var(--ink-mid);
      transition: width 0.3s linear;
    }
    .stretch-tips {
      position: absolute;
      bottom: clamp(30px, 5vh, 60px);
      left: 50%; transform: translateX(-50%);
      text-align: center; width: 90%; max-width: 420px;
    }
    .stretch-tip-label {
      font-size: 0.62rem; color: var(--ink-ghost);
      letter-spacing: 0.08em; margin-bottom: 0.6em;
    }
    .stretch-tip-text {
      font-family: var(--font-title); font-weight: 300;
      font-size: 0.82rem; color: var(--ink-light);
      letter-spacing: 0.06em; line-height: 1.7;
      min-height: 2.8em;
      transition: opacity 0.5s var(--ease-ink);
    }
    .stretch-tip-text.fading { opacity: 0; }

    /* ══════════════════════════════════════════════════════════
       CALIBRATION
       ══════════════════════════════════════════════════════════ */
    #calibration-overlay {
      position: absolute; inset: 0; z-index: 50;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(240, 236, 228, 0.85);
      opacity: 0; visibility: hidden;
      transition: opacity 0.6s var(--ease-ink), visibility 0.6s;
    }
    #calibration-overlay.active { opacity: 1; visibility: visible; }
    #calibration-overlay.fade-out { opacity: 0; visibility: hidden; }
    .calibration-text {
      font-family: var(--font-title); font-size: 1.2rem;
      color: var(--ink-mid); letter-spacing: 0.15em; margin-bottom: 1.5em;
    }
    .calibration-progress { width: 200px; height: 2px; background: var(--xuan-shadow); border-radius: 1px; overflow: hidden; }
    .calibration-progress-bar { height: 100%; width: 0%; background: var(--ink-mid); transition: width 0.1s linear; }
    .calibration-hint { margin-top: 1.5em; font-size: 0.8rem; color: var(--ink-faint); letter-spacing: 0.1em; }

    /* ══════════════════════════════════════════════════════════
       HUD
       ══════════════════════════════════════════════════════════ */
    #hud {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      padding: 20px 24px; display: flex;
      justify-content: space-between; align-items: flex-start;
      pointer-events: none; opacity: 0;
      transition: opacity 0.8s var(--ease-ink);
    }
    #hud.visible { opacity: 1; }
    .hud-left { display: flex; flex-direction: column; gap: 8px; }
    .hud-title { font-family: var(--font-title); font-size: 0.85rem; color: var(--ink-faint); letter-spacing: 0.1em; opacity: 0.6; }
    .hud-fps { font-family: var(--font-body); font-size: 0.7rem; color: var(--ink-faint); opacity: 0.5; }
    .hud-progress-wrap { width: 100px; height: 2px; background: var(--xuan-shadow); border-radius: 1px; overflow: hidden; opacity: 0.6; }
    .hud-progress-fill { height: 100%; width: 0%; background: var(--ink-faint); transition: width 0.3s linear; }
    .hud-match { font-family: var(--font-body); font-size: 0.65rem; color: var(--ink-faint); opacity: 0; transition: opacity 0.6s var(--ease-ink), color 0.6s; letter-spacing: 0.08em; }
    .hud-match.rich { opacity: 0.6; color: var(--accent-gold); }
    .hud-match.flowing { opacity: 0.4; color: var(--ink-faint); }
    .hud-match.sparse { opacity: 0; }

    /* ══════════════════════════════════════════════════════════
       COMPLETION
       ══════════════════════════════════════════════════════════ */
    #completion-screen {
      position: absolute; inset: 0; z-index: 40;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 60px; opacity: 0; visibility: hidden;
      transition: opacity 1.2s var(--ease-ink), visibility 1.2s;
    }
    #completion-screen.visible { opacity: 1; visibility: visible; }
    .completion-bar {
      display: flex; gap: 24px;
      background: rgba(240, 236, 228, 0.7);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      padding: 16px 32px; border-radius: 24px;
      transform: translateY(20px); opacity: 0;
      transition: transform 0.8s var(--ease-ink) 2s, opacity 0.8s var(--ease-ink) 2s;
    }
    #completion-screen.visible .completion-bar { transform: translateY(0); opacity: 1; }
    .completion-bar button {
      font-family: var(--font-title); font-size: 0.85rem;
      color: var(--ink-mid); background: none; border: none;
      cursor: pointer; letter-spacing: 0.1em;
      padding: 6px 16px; border-radius: 4px;
      transition: color 0.3s, background 0.3s;
    }
    .completion-bar button:hover { color: var(--ink-deepest); background: rgba(26, 20, 16, 0.06); }

    #status-toast {
      position: absolute; bottom: 30px; left: 50%;
      transform: translateX(-50%); z-index: 60;
      font-family: var(--font-body); font-size: 0.8rem;
      color: var(--ink-mid);
      background: rgba(240, 236, 228, 0.9);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 8px 20px; border-radius: 20px;
      letter-spacing: 0.08em; opacity: 0;
      transition: opacity 0.4s var(--ease-ink);
    }
    #status-toast.show { opacity: 1; }

    #debug-panel {
      position: absolute; bottom: 10px; right: 10px; z-index: 200;
      background: rgba(26, 20, 16, 0.85); color: #ccc;
      font-family: monospace; font-size: 11px;
      padding: 10px 14px; border-radius: 8px;
      max-width: 320px; line-height: 1.5;
      backdrop-filter: blur(4px); display: none;
    }
    #debug-panel.visible { display: block; }
    #debug-panel .label { color: var(--accent-gold); }
  </style>
</head>
<body>
  <div id="app">
    <video id="camera-feed" class="canvas-layer" autoplay playsinline muted></video>
    <canvas id="ink-canvas" class="canvas-layer"></canvas>
    <canvas id="guide-canvas" class="canvas-layer"></canvas>
    <canvas id="debug-canvas" class="canvas-layer"></canvas>

    <!-- Landing Screen -->
    <div id="landing-screen">
      <canvas id="splash-canvas"></canvas>
      <div class="landing-content">
        <h1 class="landing-title">行 气</h1>
        <p class="landing-subtitle">以身运笔，虚实相生</p>
        <div class="theme-circles" id="theme-circles"></div>
        <div class="theme-desc" id="theme-desc">
          <p class="theme-desc-name" id="theme-desc-name"></p>
          <p class="theme-desc-en" id="theme-desc-en"></p>
          <p class="theme-desc-mood" id="theme-desc-mood"></p>
        </div>
        <button class="btn-ink" id="btn-start">开始习练</button>
        <p class="landing-privacy">摄像头数据仅在本地处理，不上传任何图像</p>
      </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
      <div class="loading-ink-drop"></div>
      <p class="loading-status" id="loading-status">正在准备…</p>
      <div class="loading-progress">
        <div class="loading-progress-bar" id="loading-bar"></div>
      </div>
      <div class="stretch-tips">
        <p class="stretch-tip-label">习练前小提示</p>
        <p class="stretch-tip-text" id="stretch-tip"></p>
      </div>
    </div>

    <!-- Calibration Overlay -->
    <div id="calibration-overlay">
      <p class="calibration-text">环境感知中…</p>
      <div class="calibration-progress">
        <div class="calibration-progress-bar" id="calibration-bar"></div>
      </div>
      <p class="calibration-hint">请站在画面中央，自然站立</p>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-left">
        <span class="hud-title" id="hud-theme-name">行气</span>
        <div class="hud-progress-wrap">
          <div class="hud-progress-fill" id="hud-progress"></div>
        </div>
        <span class="hud-match" id="hud-match"></span>
      </div>
      <span class="hud-fps" id="hud-fps"></span>
    </div>

    <!-- Completion Screen -->
    <div id="completion-screen">
      <div class="completion-bar">
        <button id="btn-export">保存作品</button>
        <button id="btn-restart">再来一次</button>
      </div>
    </div>

    <div id="status-toast"></div>

    <div id="debug-panel">
      <div><span class="label">State:</span> <span id="dbg-state">init</span></div>
      <div><span class="label">FPS:</span> <span id="dbg-fps">-</span></div>
      <div><span class="label">Pose:</span> <span id="dbg-pose">-</span></div>
      <div><span class="label">Joints:</span> <span id="dbg-joints">-</span></div>
      <div><span class="label">Calibration:</span> <span id="dbg-cal">-</span></div>
      <div><span class="label">Playback:</span> <span id="dbg-playback">-</span></div>
      <div><span class="label">Match:</span> <span id="dbg-match">-</span></div>
      <div><span class="label">Level:</span> <span id="dbg-level">-</span></div>
      <div style="margin-top:6px;color:#888;">
        [D] 调试 · [S] 骨骼 · [L] 标签 · [R] 重置<br>
        [C] 清墨 · [E] 导出 · [G] 引导 · [T] 主题<br>
        [Space] 暂停/继续
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
